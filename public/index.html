<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRLink</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#f0f0f0;font-family:system-ui,sans-serif;min-height:100vh}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:#161616;border-bottom:1px solid #222;position:sticky;top:0;z-index:99}
.nav-logo{font-weight:900;font-size:20px}
.nav-logo span{color:#ff4d00}
.btn-add{background:#ff4d00;color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:20px}
.stat{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:14px;padding:16px}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:900;letter-spacing:-1px}

/* CREATE */
.create-wrap{padding:0 20px 20px;display:none}
.create-wrap.open{display:block}
.create-box{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:14px;padding:20px}
.create-box h3{font-size:15px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field input{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;font-family:inherit;outline:none}
.field input:focus{border-color:#ff4d00}
.btn-create{width:100%;background:#ff4d00;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.btn-create:disabled{opacity:.5}

/* LIST */
.list-title{padding:0 20px 10px;font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.links{padding:0 20px;display:flex;flex-direction:column;gap:10px;padding-bottom:40px}
.link-card{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px}
.link-thumb{width:52px;height:52px;background:#fff;border-radius:8px;padding:4px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.link-thumb canvas,.link-thumb img{width:100%!important;height:100%!important}
.link-info{flex:1;min-width:0}
.link-name{font-size:15px;font-weight:700;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-short{font-size:12px;color:#ff7a3d;font-weight:600;margin-bottom:2px}
.link-dest{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-btns{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-sm{width:34px;height:34px;border-radius:8px;border:1px solid #333;background:#111;color:#888;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.btn-sm:active{background:#222}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#1c1c1c;border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px 20px 40px;position:relative}
.sheet-handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:16px}
.sheet-qr{background:#fff;border-radius:14px;padding:16px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.sheet-short{font-size:16px;font-weight:700;color:#ff7a3d;margin-bottom:4px}
.sheet-dest{font-size:13px;color:#666;word-break:break-all;margin-bottom:16px}
.edit-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:700}
.edit-row{display:flex;gap:8px;margin-bottom:16px}
.edit-row input{flex:1;background:#111;border:1px solid #333;border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none}
.edit-row input:focus{border-color:#ff4d00}
.btn-update{background:#ff4d00;color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-update.ok{background:#22c55e}
.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-action{padding:13px 0;border-radius:10px;border:1px solid #333;background:#111;color:#f0f0f0;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#555}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;color:#777;margin-bottom:6px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#222;border:1px solid #333;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{text-align:center;padding:40px;color:#555;font-size:14px}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-logo">QR<span>Link</span></div>
  <button class="btn-add" onclick="toggleCreate()">+ Nouveau</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Liens</div><div class="stat-value" id="stat-links">—</div></div>
  <div class="stat"><div class="stat-label">Scans</div><div class="stat-value" id="stat-scans">—</div></div>
</div>

<div class="create-wrap" id="create-wrap">
  <div class="create-box">
    <h3>Nouveau lien QR</h3>
    <div class="field"><label>Nom</label><input id="new-name" placeholder="ex: Mon Instagram" type="text"></div>
    <div class="field"><label>URL</label><input id="new-url" placeholder="https://..." type="url"></div>
    <button class="btn-create" id="btn-create" onclick="createLink()">Créer le QR ⚡</button>
  </div>
</div>

<div class="list-title">Mes liens</div>
<div class="links" id="links-list"><div class="loading">Chargement…</div></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 id="sheet-title"></h2>
    <div class="sheet-qr"><div id="sheet-qr"></div></div>
    <div class="sheet-short" id="sheet-short"></div>
    <div class="sheet-dest" id="sheet-dest"></div>
    <div class="edit-label">Changer la destination</div>
    <div class="edit-row">
      <input type="url" id="edit-url" placeholder="Nouvelle URL...">
      <button class="btn-update" id="btn-update" onclick="saveUrl()">Maj</button>
    </div>
    <div class="sheet-actions">
      <button class="btn-action" onclick="copyShort()">📋 Copier</button>
      <button class="btn-action" onclick="downloadQR()">⬇ QR PNG</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://lxeplyrlshnfkzfeflrr.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZXBseXJsc2huZmt6ZmVmbHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjA2MjUsImV4cCI6MjA5NjU5NjYyNX0.aEnIpLUN0PmO5twe1ruNJ5t8TuWpLrohkADDzWcO3mI';
const BASE_URL = 'https://qrlink-cdnv.vercel.app';

const H = {
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

let links = [], activeId = null;

function uid(){ return Math.random().toString(36).slice(2,7).toUpperCase(); }
function shortUrl(id){ return BASE_URL + '/' + id; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg, d=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),d);
}

function updateStats(){
  document.getElementById('stat-links').textContent = links.length;
  document.getElementById('stat-scans').textContent = links.reduce((s,l)=>s+(l.scans||0),0);
}

function renderThumb(id, url){
  const el=document.getElementById('thumb-'+id);
  if(!el) return;
  el.innerHTML='';
  new QRCode(el,{text:url||'https://example.com',width:44,height:44,colorDark:'#111',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
}

function renderList(){
  const list=document.getElementById('links-list');
  list.innerHTML='';
  if(links.length===0){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔗</div><h3>Aucun lien</h3><p>Appuie sur + Nouveau pour commencer</p></div>`;
    updateStats(); return;
  }
  links.forEach(l=>{
    const d=document.createElement('div');
    d.className='link-card'; d.id='card-'+l.id;
    d.innerHTML=`
      <div class="link-thumb" id="thumb-${l.id}"></div>
      <div class="link-info" onclick="openSheet('${l.id}')">
        <div class="link-name">${esc(l.name)}</div>
        <div class="link-short">${BASE_URL}/${l.id}</div>
        <div class="link-dest">${esc(l.url)}</div>
      </div>
      <div class="link-btns">
        <button class="btn-sm" onclick="openSheet('${l.id}')">✏️</button>
        <button class="btn-sm" onclick="deleteLink('${l.id}')">🗑</button>
      </div>`;
    list.appendChild(d);
    setTimeout(()=>renderThumb(l.id, l.url), 60);
  });
  updateStats();
}

async function loadLinks(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/links?order=created_at.desc`,{headers:H});
    const data=await r.json();
    links=Array.isArray(data)?data:[];
    renderList();
  }catch(e){
    document.getElementById('links-list').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><h3>Erreur de connexion</h3></div>`;
  }
}

function toggleCreate(){
  const w=document.getElementById('create-wrap');
  w.classList.toggle('open');
  if(w.classList.contains('open')) document.getElementById('new-name').focus();
}

async function createLink(){
  const name=document.getElementById('new-name').value.trim();
  const url=document.getElementById('new-url').value.trim();
  if(!name||!url){toast('⚠️ Remplis les deux champs');return;}
  if(!url.startsWith('http')){toast('⚠️ URL invalide');return;}
  const btn=document.getElementById('btn-create');
  btn.disabled=true; btn.textContent='Création…';
  try{
    const body={id:uid(),name,url,scans:0};
    const r=await fetch(`${SUPA_URL}/rest/v1/links`,{method:'POST',headers:H,body:JSON.stringify(body)});
    const data=await r.json();
    if(!r.ok) throw new Error(JSON.stringify(data));
    const created=Array.isArray(data)?data[0]:body;
    links.unshift(created);
    renderList();
    document.getElementById('new-name').value='';
    document.getElementById('new-url').value='';
    document.getElementById('create-wrap').classList.remove('open');
    toast('✅ Lien créé !');
  }catch(e){
    console.error(e);
    toast('❌ Erreur : '+e.message);
  }
  btn.disabled=false; btn.textContent='Créer le QR ⚡';
}

async function deleteLink(id){
  if(!confirm('Supprimer ?')) return;
  await fetch(`${SUPA_URL}/rest/v1/links?id=eq.${id}`,{method:'DELETE',headers:H});
  links=links.filter(l=>l.id!==id);
  renderList();
  toast('🗑 Supprimé');
}

function openSheet(id){
  const l=links.find(x=>x.id===id);
  if(!l) return;
  activeId=id;
  document.getElementById('sheet-title').textContent=l.name;
  document.getElementById('sheet-short').textContent=shortUrl(id);
  document.getElementById('sheet-dest').textContent=l.url;
  document.getElementById('edit-url').value=l.url;
  const qrEl=document.getElementById('sheet-qr');
  qrEl.innerHTML='';
  new QRCode(qrEl,{text:l.url,width:200,height:200,colorDark:'#111',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
  const btn=document.getElementById('btn-update');
  btn.textContent='Maj'; btn.classList.remove('ok');
  document.getElementById('overlay').classList.add('open');
}

function closeSheet(e){
  if(e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

async function saveUrl(){
  const l=links.find(x=>x.id===activeId);
  if(!l) return;
  const newUrl=document.getElementById('edit-url').value.trim();
  if(!newUrl||!newUrl.startsWith('http')){toast('⚠️ URL invalide');return;}
  const btn=document.getElementById('btn-update');
  btn.disabled=true; btn.textContent='…';
  try{
    await fetch(`${SUPA_URL}/rest/v1/links?id=eq.${activeId}`,{method:'PATCH',headers:H,body:JSON.stringify({url:newUrl})});
    l.url=newUrl;
    document.getElementById('sheet-dest').textContent=newUrl;
    const qrEl=document.getElementById('sheet-qr');
    qrEl.innerHTML='';
    new QRCode(qrEl,{text:newUrl,width:200,height:200,colorDark:'#111',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});
    setTimeout(()=>renderThumb(activeId,newUrl),60);
    const card=document.getElementById('card-'+activeId);
    if(card) card.querySelector('.link-dest').textContent=newUrl;
    btn.textContent='✓'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='Maj';btn.classList.remove('ok');btn.disabled=false;},2000);
    toast('🔄 Destination mise à jour !');
  }catch(e){
    toast('❌ Erreur'); btn.disabled=false; btn.textContent='Maj';
  }
}

function copyShort(){
  navigator.clipboard.writeText(shortUrl(activeId));
  toast('📋 Lien copié !');
}

function downloadQR(){
  const canvas=document.getElementById('sheet-qr').querySelector('canvas');
  if(!canvas){toast('⚠️ QR non prêt');return;}
  const l=links.find(x=>x.id===activeId);
  const a=document.createElement('a');
  a.download='qr-'+(l?l.name.replace(/\W+/g,'_'):activeId)+'.png';
  a.href=canvas.toDataURL('image/png'); a.click();
  toast('⬇ QR téléchargé !');
}

loadLinks();
</script>
</body>
</html>
